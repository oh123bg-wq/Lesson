<!DOCTYPE html>
<html>
    <head>
        <title>This is a title tags</title>
    </head>
    <body>
        <!-- h1 is the biggest size of word and h6 is the smallest # EXAM WILL ASK -->
        <h1> First heading</h1>
        <h2>Another heading</h2>
        <p>A paragraph text</p>
        <img src="assets/cat 1.jpg" alt="A picture of cat" width="300">
        <!-- Note This is a comment block(control and / to make it) -->
        <!-- This will no be rendered by program -->
        <!-- It serves the purpose of explaining/commenting for programmer -->

        <!-- The next tags you will be learning are LISTS -->
        <!-- ul,ol,li -->
        <ul>
            <li><em>Basketball</em></li>
            <li><strong>Volleyball</strong></li>
            <li>badminton</li>

        </ul>
        <ol>
            <li>Russia</li>
            <li>Malaysia</li>
            <ul>
                <li><b>Penang</b></li>
                <li>KL</li>
                <li>Selangor</li>
                <li>Johor</li>
            </ul>
            <li>Japan</li>
        </ol>

    </body>
</html>
