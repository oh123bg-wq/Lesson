<!DOCTYPE html>
<html lang="en">
    <head>

        <meta charset="UTF-8">
        <!-- responsive layout to fix your device size -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Box Model Expamle</title>
        <style>
            .box{
                box-sizing: content-box;
                width: 100px;
                height: 100px;
                background-color: lightblue;
                padding: 10px;
                border: 5px solid blue;
                margin:auto;
                border-radius: 50%;

            }
        </style>

    </head>
    <body>
        <!-- div.box (shortcut key) -->
        <div class="box">
            <h1>HI</h1>
        </div>
    </body>
</html>
